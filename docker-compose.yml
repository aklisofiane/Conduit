services:
  postgres:
    image: postgres:18-alpine
    container_name: conduit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: conduit
      POSTGRES_PASSWORD: conduit
      POSTGRES_DB: conduit
    ports:
      - '5434:5432'
    volumes:
      - conduit_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U conduit -d conduit']
      interval: 5s
      timeout: 5s
      retries: 10

  temporal-postgres:
    image: postgres:18-alpine
    container_name: conduit-temporal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U temporal -d temporal']
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25.2
    container_name: conduit-temporal
    restart: unless-stopped
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - '7233:7233'

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: conduit-temporal-ui
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:5173,http://localhost:3001
    ports:
      - '8080:8080'

  redis:
    image: redis:8-alpine
    container_name: conduit-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - conduit_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  conduit_pg_data:
  temporal_pg_data:
  conduit_redis_data:
